name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/pages --jq '.html_url' 2>/dev/null || echo "disabled")
          if [ "$STATUS" = "disabled" ]; then
            echo "Pages not enabled. Attempting to enable..."
            gh api repos/${{ github.repository }}/pages \
              --method POST \
              -f source[branch]=main \
              -f source[path]=/docs \
              --silent 2>/dev/null && echo "SUCCESS: Pages enabled" || echo "FAILED: Need manual enable"
          else
            echo "Pages already enabled at: $STATUS"
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
